<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Diagnosis Records</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Merienda:wght@700&display=swap" rel="stylesheet">

</head>

<body>

<header>

<img src="images/logo.png" class="logo">

<h2>फसल संजीवनी</h2>

<p class="tagline">
Diagnosis Records
</p>

</header>

<section class="result-box">

<h1 style="text-align:center;color:#2E7D32;margin-bottom:30px;">

📋 Diagnosis History

</h1>

<div id="historyContainer">

</div>

<div style="text-align:center;margin-top:30px;">

<button onclick="window.location.href='index.html'">

⬅ Back to Home

</button>

</div>

</section>

<script>
const container = document.getElementById("historyContainer");

fetch("http://10.226.123.88:5000/history")
.then(res => res.json())
.then(historyData => {

if(historyData && historyData.length > 0){

historyData.forEach((item, index) => {

let icon = "🦠";

const disease = item.disease.toLowerCase();

if(disease.includes("healthy")) icon = "🌿";
else if(disease.includes("blight")) icon = "🍂";

container.innerHTML += `
<div class="history-card">
    <h2>${icon} Record ${index+1}</h2>
    <p><strong>Image</strong><br>${item.image}</p>
    <p><strong>Disease</strong><br>${item.disease}</p>
    <p><strong>Confidence</strong><br>${item.confidence}%</p>
    <p><strong>Date & Time</strong><br>${item.time}</p>
</div>
`;
});

} else {
container.innerHTML = `
<div class="history-card">
<h2>📂 No Records Found</h2>
<p>No diagnosis history available.</p>
</div>
`;
}

})
.catch(err => {
    console.error("History Error:", err);
container.innerHTML = `
<div class="history-card">
<h2>⚠️ Backend Not Connected</h2>
<p>${err}</p>
</div>
`;
});
</script>

</body>

</html>
