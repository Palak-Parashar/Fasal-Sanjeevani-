<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Weather Updates</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Merienda:wght@700&display=swap" rel="stylesheet">

</head>

<body>

<header>

<img src="images/logo.png" class="logo">

<h2>फसल संजीवनी</h2>

<p class="tagline">
Weather Updates
</p>

</header>


<section class="result-box">

<h1 style="text-align:center;color:#2E7D32;margin-bottom:25px;">

🌦 Live Weather Report

</h1>
<div style="text-align:center;margin-bottom:30px;">

<input
id="cityInput"
type="text"
placeholder="Enter City Name"
style="padding:12px;
width:280px;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;">

<br><br>

<button onclick="getWeather()">

🌦 Get Weather

</button>

</div>

<div id="report" style="display:none;">

<div style="text-align:center;">

<div class="weather-icon">
☀️
</div>

<h2 id="city"></h2>

</div>

<div class="info-card">

<p>

<strong>🌡 Temperature</strong><br>

<span id="temperature"></span>

</p>

</div>

<div class="info-card">

<p>

<strong>💧 Humidity</strong><br>

<span id="humidity"></span>

</p>

</div>

<div class="info-card">

<p>

<strong>☁ Weather Condition</strong><br>

<span id="condition"></span>

</p>

</div>

<div class="info-card">

<p>

<strong>🕒 Updated</strong><br>

<span id="updated"></span>

</p>

</div>
</div>
<div style="text-align:center;margin-top:30px;">

<button onclick="window.location.href='index.html'">

⬅ Back to Home

</button>

</div>

</section>


<script>

function getWeather(){

    const city=document.getElementById("cityInput").value;

    if(city===""){
        alert("Please enter city name");
        return;
    }

    fetch(`http://192.168.0.173:5000/weather?city=${encodeURIComponent(city)}`)

    .then(response=>response.json())

    .then(weather=>{

        document.getElementById("report").style.display="block";

        document.getElementById("city").innerHTML="📍 "+weather.city;

        document.getElementById("temperature").innerHTML=
        weather.temperature+" °C";

        document.getElementById("humidity").innerHTML=
        weather.humidity+" %";

        document.getElementById("condition").innerHTML=
        weather.weather;

        document.getElementById("updated").innerHTML=
        new Date().toLocaleString();

        const icon=document.querySelector(".weather-icon");

        const condition=weather.weather.toLowerCase();

        if(condition.includes("rain"))
            icon.innerHTML="🌧";

        else if(condition.includes("cloud"))
            icon.innerHTML="☁";

        else if(condition.includes("clear"))
            icon.innerHTML="☀";

        else if(condition.includes("mist"))
            icon.innerHTML="🌫";

        else
            icon.innerHTML="🌤";

    })

    .catch(error=>{

        console.log(error);

        alert("Unable to fetch weather.");

    });

}

</script>

</body>

</html>
